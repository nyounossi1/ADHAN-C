name: ESP32 firmware build

on:
  push:
    branches: [ main, dev, 'AD-*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-v3-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-v3-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run native unit tests
        run: platformio test -e native --without-uploading --junit-output-path test-results/results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Native Unit Tests
          path: test-results/results.xml
          reporter: java-junit

      - name: Build firmware
        run: platformio run

      - name: Name firmware binary
        run: |
          mkdir -p dist
          # Use tag name for releases, short SHA for branch/PR builds
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            FNAME="adhan-firmware-${{ github.ref_name }}.bin"
          else
            FNAME="adhan-firmware-${{ github.sha }}.bin"
          fi
          cp .pio/build/esp32dev/firmware.bin dist/$FNAME
          echo "FIRMWARE_FILE=dist/$FNAME" >> $GITHUB_ENV

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhan-firmware-${{ github.sha }}
          path: ${{ env.FIRMWARE_FILE }}
          retention-days: 30

      - name: Attach firmware to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.FIRMWARE_FILE }}
