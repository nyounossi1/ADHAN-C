name: ESP32 firmware build

on:
  push:
    branches: [ main, dev, 'AD-*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-v3-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-v3-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: platformio run

      - name: Rename firmware binary
        run: |
          mkdir -p dist
          cp .pio/build/esp32dev/firmware.bin dist/adhan-firmware-${{ github.ref_name }}.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: adhan-firmware-${{ github.sha }}
          path: dist/adhan-firmware-${{ github.ref_name }}.bin
          retention-days: 30

      - name: Attach firmware to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/adhan-firmware-${{ github.ref_name }}.bin
